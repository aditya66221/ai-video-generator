<!DOCTYPE html>
<html>
<head>
    <title>AI Video Generator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #0f172a;
            color: white;
        }
        input {
            padding: 10px;
            width: 300px;
        }
        button {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
        }
        video {
            margin-top: 20px;
            width: 400px;
        }
    </style>
</head>
<body>

    <h1>🎬 AI Video Generator</h1>

    <form method="POST">
        <input type="text" name="prompt" placeholder="Enter prompt..." required>
        <br><br>
        <button type="submit">Generate Video</button>
    </form>

    {% if video_path %}
        <h2>Generated Video:</h2>
        <video controls>
            <source src="{{ video_path }}" type="video/mp4">
        </video>
    {% endif %}

</body>
</html>
